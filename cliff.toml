[changelog]
header = """
# Changelog\n
Toutes les modifications notables de Popote sont documentées ici.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Non publié]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",     group = "✨ Nouveautés" },
  { message = "^fix",      group = "🐛 Corrections" },
  { message = "^perf",     group = "⚡ Performances" },
  { message = "^refactor", group = "♻️ Refactoring" },
  { message = "^docs",     group = "📝 Documentation" },
  { message = "^ci",       group = "👷 CI/CD" },
  { message = "^build",    group = "🏗️ Build" },
  { message = "^chore",    skip = true },
  { message = "^style",    skip = true },
  { message = "^wip",      skip = true },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
