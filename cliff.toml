[changelog]
header = """
# Changelog\n
Toutes les modifications notables de Popote sont documentées ici.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Non publié]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | split(pat="\n") | first }}
{% endfor %}
{% endfor %}\
{% if github.contributors | length > 0 %}
### 👥 Contributeurs

{% for contributor in github.contributors | sort(attribute="username") %}\
* @{{ contributor.username }}
{% endfor %}
{% endif %}\
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
  { pattern = "(\\w+(?:\\([^)]*\\))?!?:\\s+)[^\\w\\s]+\\s*", replace = "$1" },
]
commit_parsers = [
  { message = "^feat",     group = "✨ Nouveautés" },
  { message = "^fix",      group = "🐛 Corrections" },
  { message = "^perf",     group = "⚡ Performances" },
  { message = "^refactor", group = "♻️ Refactoring" },
  { message = "^docs",     group = "📝 Documentation" },
  { message = "^ci",       group = "👷 CI/CD" },
  { message = "^build",    group = "🏗️ Build" },
  { message = "^chore\\(version\\)|^chore: bump version", skip = true },
  { message = "^chore",    skip = true },
  { message = "^style",    skip = true },
  { message = "^wip",      skip = true },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"

[remote.github]
owner = "lguerard"
repo = "popote"
