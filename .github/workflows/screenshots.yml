name: Screenshots

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    name: Capture Android screenshots
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Start mock backend
        run: python3 scripts/mock_server.py &

      - name: Wait for mock server
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:8000/api/health && break
            sleep 1
          done

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Install Android SDK API 35
        run: |
          echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Set up Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build debug APK (mock server URL)
        run: gradle assembleDebug --no-daemon -PserverUrl=http://10.0.2.2:8000
        working-directory: android

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run emulator and capture screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_5
          target: google_apis
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save
            -no-audio
            -no-boot-anim
            -gpu swiftshader_indirect
          disable-animations: true
          script: |
            adb install android/app/build/outputs/apk/debug/app-debug.apk
            bash scripts/take_screenshots.sh

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/android/
          if git diff --cached --quiet; then
            echo "No screenshot changes."
          else
            git commit -m "docs(screenshots): 📷 auto-update Android screenshots [skip ci]"
            git push
          fi
