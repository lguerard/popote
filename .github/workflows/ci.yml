name: CI / Release

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Debug build — dev branch & PRs ──────────────────────────────────────────
  build-debug:
    name: Debug APK
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - run: chmod +x android/gradlew

      - name: Set up Android SDK path
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cat android/local.properties
          java -version
          ls -la android/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android

      - uses: actions/upload-artifact@v4
        with:
          name: popote-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ── Release — push to main ───────────────────────────────────────────────────
  release:
    name: Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Determine next version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT=$(git cliff --bumped-version --github-token "$GITHUB_TOKEN" \
            2>/dev/null || echo "v0.1.0")
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          SEMVER="${NEXT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"
          CODE=$(( ${MAJOR:-0} * 10000 + ${MINOR:-0} * 100 + ${PATCH:-0} ))
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "name=$SEMVER" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git cliff --tag "${{ steps.version.outputs.tag }}" --unreleased \
            --strip all --github-token "$GITHUB_TOKEN" -o RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - run: chmod +x android/gradlew

      - name: Set up Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Prepare keystore
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/keystore.jks
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "No keystore secret — building unsigned APK"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK (signed)
        if: steps.keystore.outputs.available == 'true'
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PversionName="${{ steps.version.outputs.name }}" \
            -PversionCode="${{ steps.version.outputs.code }}" \
            -Pandroid.injected.signing.store.file="${{ github.workspace }}/android/keystore.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
        working-directory: android

      - name: Build release APK (unsigned)
        if: steps.keystore.outputs.available != 'true'
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PversionName="${{ steps.version.outputs.name }}" \
            -PversionCode="${{ steps.version.outputs.code }}"
        working-directory: android

      - name: Locate and rename APK
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          SIGNED="android/app/build/outputs/apk/release/app-release.apk"
          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$SIGNED" ]; then
            mv "$SIGNED" "popote-${TAG}.apk"
          elif [ -f "$UNSIGNED" ]; then
            mv "$UNSIGNED" "popote-${TAG}-unsigned.apk"
            echo "Note: APK is unsigned. Add KEYSTORE_* secrets for signed builds."
          else
            echo "ERROR: No APK found in release output dir"
            ls android/app/build/outputs/apk/release/ || true
            exit 1
          fi
          ls popote-*.apk

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Popote ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: popote-*.apk
          draft: false
          prerelease: false
