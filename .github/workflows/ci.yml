name: CI / Release

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Debug build — dev branch & PRs ──────────────────────────────────────────
  build-debug:
    name: Debug APK
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - run: chmod +x android/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - uses: actions/upload-artifact@v4
        with:
          name: popote-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ── Release — push to main ───────────────────────────────────────────────────
  release:
    name: Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Determine next version
        id: version
        run: |
          NEXT=$(git cliff --bumped-version 2>/dev/null || echo "v0.1.0")
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          # versionCode: major*10000 + minor*100 + patch
          SEMVER="${NEXT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"
          CODE=$(( ${MAJOR:-0} * 10000 + ${MINOR:-0} * 100 + ${PATCH:-0} ))
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "name=$SEMVER" >> "$GITHUB_OUTPUT"

      - name: Generate changelog for this release
        id: changelog
        run: |
          git cliff --tag "${{ steps.version.outputs.tag }}" --unreleased --strip all \
            -o RELEASE_NOTES.md
          echo "Generated RELEASE_NOTES.md"

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - run: chmod +x android/gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks

      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PversionName="${{ steps.version.outputs.name }}" \
            -PversionCode="${{ steps.version.outputs.code }}" \
            -Pandroid.injected.signing.store.file="${{ github.workspace }}/android/keystore.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
        working-directory: android

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             popote-${{ steps.version.outputs.tag }}.apk

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Popote ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: popote-${{ steps.version.outputs.tag }}.apk
          draft: false
          prerelease: false
